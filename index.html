<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Snake Arena - Legendary Tournament Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05040d !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
            touch-action: none;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
            display: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Compact Top Right Leaderboard */
        #leaderboard-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 180px;
            background: rgba(10, 8, 28, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            font-size: 11px;
            z-index: 5;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #leaderboard-panel h3 {
            font-size: 12px;
            color: #00ff88;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 3px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            font-weight: 500;
        }
        .leaderboard-row.player-row {
            color: #00f2fe;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.6);
        }
        .leaderboard-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 110px;
        }

        #boost-notifier {
            margin-top: 6px;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .boost-charging { color: #a4b0be; opacity: 0.6; }
        .boost-ready { color: #00ff88; text-shadow: 0 0 8px rgba(0,255,136,0.6); animation: pulseAlert 1s infinite alternate; }
        .boost-active { color: #00f2fe; text-shadow: 0 0 12px rgba(0,242,254,0.8); }

        @keyframes pulseAlert {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(16, 12, 42, 0.95) 0%, rgba(4, 3, 10, 0.99) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 25px 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Profile Card with interactive Level Stream launch ability */
        .profile-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,165,2,0.4);
            border-radius: 20px;
            padding: 15px 25px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(255,165,2,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .profile-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 32px rgba(255,165,2,0.3);
        }
        .profile-card::after {
            content: "✨ View Rewards";
            position: absolute;
            bottom: 4px;
            right: 12px;
            font-size: 9px;
            color: #ffa502;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }
        .level-display-title {
            font-size: 18px;
            font-weight: 800;
            color: #ffa502;
            text-shadow: 0 0 10px rgba(255,165,2,0.5);
            margin-bottom: 5px;
        }
        .xp-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .xp-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffa502, #ff7f50);
            box-shadow: 0 0 8px #ffa502;
            transition: width 0.4s ease;
        }
        .xp-text {
            font-size: 11px;
            color: #a4b0be;
            margin-top: 4px;
        }
        
        h1 {
            font-size: clamp(32px, 9vw, 55px);
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00f2fe, #be2edd);
            background-size: 400% 400%;
            animation: flowGlow 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 30px rgba(0,255,136,0.2);
            flex-shrink: 0;
        }

        @keyframes flowGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #8e92a4;
            font-size: clamp(11px, 3.2vw, 14px);
            margin-bottom: 20px;
            flex-shrink: 0;
            font-weight: 500;
        }

        .name-input-container {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .name-input-container label {
            font-size: 11px;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .name-input-container input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.12);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
            width: 260px;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .name-input-container input:focus {
            border-color: #00ff88;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }

        .tab-headers {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #cbccd6;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #00ff88;
            color: #05040d;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0,255,136,0.4);
        }

        .custom-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 520px;
            flex-shrink: 0;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.4);
        }
        .grid-view {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        .grid-view::-webkit-scrollbar { width: 5px; }
        .grid-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .color-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }
        .color-btn:active { transform: scale(0.9); }
        .color-btn.active { border-color: #ffffff; box-shadow: 0 0 12px rgba(255,255,255,0.5); }

        .flag-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 10px 15px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            position: relative;
            transition: all 0.2s;
        }
        .flag-btn:active { transform: scale(0.95); }
        .flag-btn.active {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.12);
            box-shadow: 0 0 10px rgba(0,255,136,0.2);
        }

        /* Insane Glowing Legendary States */
        .legendary-glow-item {
            animation: insaneNeonBorder 2s ease-in-out infinite alternate;
            background: rgba(255, 0, 128, 0.1) !important;
        }
        @keyframes insaneNeonBorder {
            0% { border-color: #ff0055; box-shadow: 0 0 8px #ff0055, inset 0 0 4px #ff0055; }
            50% { border-color: #9400d3; box-shadow: 0 0 18px #9400d3, inset 0 0 8px #9400d3; }
            100% { border-color: #ffd700; box-shadow: 0 0 25px #ffd700, inset 0 0 12px #ffd700; }
        }

        .skin-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 4, 13, 0.85);
            border-radius: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4757;
            font-size: 10px;
            font-weight: 800;
        }

        /* Interactive Level Stream Modal Panel Styling */
        #level-stream-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 2, 10, 0.98);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }
        .stream-title {
            font-size: 28px;
            font-weight: 900;
            color: #ffa502;
            text-shadow: 0 0 15px rgba(255,165,2,0.4);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .stream-container {
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stream-row {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }
        .stream-row.unlocked {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }
        .stream-row.current {
            border-color: #ffa502;
            background: rgba(255, 165, 2, 0.1);
            box-shadow: 0 0 12px rgba(255,165,2,0.2);
        }
        .stream-info h4 { font-size: 16px; color: #fff; }
        .stream-info p { font-size: 12px; color: #a4b0be; margin-top: 2px; }
        .stream-status { font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; }
        .status-unlocked { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-locked { background: rgba(255,71,87,0.2); color: #ff4757; }

        .action-btn {
            background: linear-gradient(45deg, #00ff88, #00ee77);
            color: #05040d;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.35);
            flex-shrink: 0;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 255, 136, 0.2); }
        .action-btn.secondary {
            background: linear-gradient(45deg, #70a1ff, #1e90ff);
            color: white;
            box-shadow: 0 6px 25px rgba(30, 144, 255, 0.35);
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-shrink: 0; width: 100%; max-width: 400px;}

        #game-over-screen h1 { color: #ff4757; background: none; -webkit-text-fill-color: #ff4757; }
        #final-score { font-size: 20px; margin-bottom: 25px; color: #a4b0be; }

        #touch-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px dashed rgba(0, 255, 136, 0.4);
            border-radius: 50%;
            display: none;
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>Score: <span id="score">0</span></div>
        <div id="boost-notifier" class="boost-charging">Boost Charging...</div>
    </div>

    <div id="leaderboard-panel">
        <h3>Top Eaters</h3>
        <div id="leaderboard-content"></div>
    </div>
    
    <div id="touch-indicator"></div>

    <div id="start-screen" class="screen-overlay">
        <h1>SNAKE ARENA</h1>
        <div class="subtitle">Double Tap / Left Click to Boost (Every 1 min)</div>
        
        <div class="profile-card" onclick="openLevelStream()">
            <div id="menuLevelTitle" class="level-display-title">Level 1</div>
            <div class="xp-bar-container">
                <div id="menuXPBar" class="xp-bar-fill"></div>
            </div>
            <div id="menuXPText" class="xp-text">0 / 100 XP</div>
        </div>

        <div class="name-input-container">
            <label for="playerNameInput">Warrior Nickname</label>
            <input type="text" id="playerNameInput" value="Player Snake" maxlength="12" oninput="checkCheatCode()">
        </div>

        <div class="tab-headers">
            <button id="tabColors" class="tab-btn active" onclick="switchTab('colors')">Skins</button>
            <button id="tabFlags" class="tab-btn" onclick="switchTab('flags')">Flags</button>
            <button id="tabEmojiSmilies" class="tab-btn" onclick="switchTab('emoji_smilies')">😀 Faces</button>
            <button id="tabEmojiWarriors" class="tab-btn" onclick="switchTab('emoji_warriors')">😎 Cool</button>
            <button id="tabEmojiAnimals" class="tab-btn" onclick="switchTab('emoji_animals')">🦁 Animals</button>
            <button id="tabEmojiLegendary" class="tab-btn" onclick="switchTab('emoji_legendary')">👑 Mythic</button>
        </div>

        <div class="custom-box">
            <div class="grid-view" id="customizerContainer"></div>
        </div>
        
        <button class="action-btn" onclick="startGame()">Enter Arena</button>
    </div>

    <div id="level-stream-modal">
        <div class="stream-title">Level Progression Stream</div>
        <div style="color: #8e92a4; font-size:13px;">Track your milestone rewards down to max Tier 100</div>
        
        <div class="stream-container" id="streamContainerScroll">
            </div>

        <button class="action-btn secondary" style="margin-bottom:0;" onclick="closeLevelStream()">Close Stream</button>
    </div>

    <div id="game-over-screen" class="screen-overlay" style="display: none; justify-content: center;">
        <h1>GAME OVER</h1>
        <div id="final-score">Score: 0</div>
        
        <div class="btn-group">
            <button class="action-btn" onclick="tryAgain()">Play Again</button>
            <button class="action-btn secondary" onclick="backToMenu()">Menu</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false }); 
        const scoreElement = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        const leaderboardPanel = document.getElementById("leaderboard-panel");
        const leaderboardContent = document.getElementById("leaderboard-content");
        const boostNotifier = document.getElementById("boost-notifier");
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScoreElement = document.getElementById("final-score");
        const customizerContainer = document.getElementById("customizerContainer");
        const playerNameInput = document.getElementById("playerNameInput");
        const touchIndicator = document.getElementById("touch-indicator");
        const levelStreamModal = document.getElementById("level-stream-modal");
        const streamContainerScroll = document.getElementById("streamContainerScroll");

        let profileState = { level: 1, xp: 0 };

        function saveProfile() {
            localStorage.setItem("snake_arena_profile_v3", JSON.stringify(profileState));
        }
        function loadProfile() {
            let saved = localStorage.getItem("snake_arena_profile_v3");
            if (saved) {
                try {
                    profileState = JSON.parse(saved);
                    if (!profileState.level) profileState.level = 1;
                    if (profileState.xp === undefined) profileState.xp = 0;
                } catch(e) { console.error(e); }
            }
            updateMenuProfileHUD();
        }

        function getXPForLevel(lvl) {
            if (lvl >= 100) return Infinity;
            return lvl * 130 + 100;
        }

        function addExperience(amount) {
            if (profileState.level >= 100) {
                profileState.level = 100;
                return;
            }
            profileState.xp += amount;
            let required = getXPForLevel(profileState.level);
            while (profileState.xp >= required && profileState.level < 100) {
                profileState.xp -= required;
                profileState.level++;
                required = getXPForLevel(profileState.level);
            }
            if(profileState.level >= 100) {
                profileState.level = 100;
                profileState.xp = 0;
            }
            saveProfile();
            updateMenuProfileHUD();
        }

        function updateMenuProfileHUD() {
            document.getElementById("menuLevelTitle").innerText = `Level ${profileState.level}` + (profileState.level >= 100 ? " (MAX)" : "");
            let req = getXPForLevel(profileState.level);
            if (profileState.level >= 100) {
                document.getElementById("menuXPBar").style.width = "100%";
                document.getElementById("menuXPText").innerText = "Glow Tag Unlocked!";
            } else {
                let pct = (profileState.xp / req) * 100;
                document.getElementById("menuXPBar").style.width = `${pct}%`;
                document.getElementById("menuXPText").innerText = `${Math.floor(profileState.xp)} / ${req} XP`;
            }
        }

        function isCheatActive() {
            return playerNameInput.value.trim().toLowerCase() === 'hehe';
        }

        function checkCheatCode() {
            if (isCheatActive()) {
                renderCustomizerItems();
            }
        }

        function checkItemLockStatus(reqLevel) {
            if (isCheatActive()) return false; 
            return profileState.level < reqLevel;
        }

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let inMenu = true;
        let mouse = { x: 0, y: 0 };
        let isDrawingTouch = false;
        let pulseTime = 0; 
        let activeTab = 'colors'; 
        let matchStartTime = 0;
        
        const baseThickness = 14; 
        const baseSnakeSpeed = 4.2;
        const attackRange = 260;
        const dangerSensorRange = 85;

        const arenaWidth = 4000;
        const arenaHeight = 3000;

        let player;
        let npcs = [];
        let foodArray = [];
        const cacheMap = {};

        let lastBoostTime = 0; 
        let boostActiveUntil = 0; 
        const boostCooldownMs = 60000; 
        const boostDurationMs = 3000;  
        let lastTapTime = 0;           

        const clothingColors = [
            { hex: "#00ff88", name: "Green", req: 1 }, { hex: "#00f2fe", name: "Cyan", req: 1 },
            { hex: "#ff4757", name: "Pink", req: 1 }, { hex: "#ffa502", name: "Orange", req: 1 },
            { hex: "#be2edd", name: "Purple", req: 5 }, { hex: "#eccc68", name: "Yellow", req: 10 },
            // Insane Tiers
            { hex: "#ff007f", name: "Neon Rose", req: 20, legendary: true }, { hex: "#7fff00", name: "Toxic Green", req: 40, legendary: true },
            { hex: "#9400d3", name: "Dark Nebula", req: 60, legendary: true }, { hex: "#ffd700", name: "Solid Gold", req: 80, legendary: true }
        ];

        const flagSkins = [
            { id: "USA", emoji: "🇺🇸", name: "USA", req: 1 }, { id: "GB", emoji: "🇬🇧", name: "UK", req: 1 },
            { id: "FR", emoji: "🇫🇷", name: "FR", req: 1 }, { id: "DE", emoji: "🇩🇪", name: "DE", req: 1 },
            { id: "CA", emoji: "🇨🇦", name: "CA", req: 5 }, { id: "BR", emoji: "🇧🇷", name: "BR", req: 10 },
            { id: "IN", emoji: "🇮🇳", name: "IN", req: 15 }, { id: "JP", emoji: "🇯🇵", name: "JP", req: 20 },
            { id: "IT", emoji: "🇮🇹", name: "IT", req: 25 }, { id: "ES", emoji: "🇪🇸", name: "ES", req: 30 },
            { id: "MX", emoji: "🇲🇽", name: "MX", req: 40 }, { id: "KR", emoji: "🇰🇷", name: "KR", req: 50, legendary: true },
            { id: "AU", emoji: "🇦🇺", name: "AU", req: 70, legendary: true }
        ];

        const emojiCategories = {
            emoji_smilies: ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇"],
            emoji_warriors: ["😎","🤓","🧐","🤠","🥳","🤡","👹","👺","👻","👽"],
            emoji_animals: ["🦁","🐯","🐱","🐶","🐺","🐻","🐼","🐨","🦄","🐮"],
            emoji_legendary: ["👑","🔱","💎","☯️","🐉","🔱","🌌","⚔️","🛸","😈"]
        };

        function getEmojiLevelRequirement(category, index) {
            if (category === 'emoji_smilies') return 1;
            if (category === 'emoji_warriors') return 5;
            if (category === 'emoji_animals') return 15;
            if (category === 'emoji_legendary') return Math.min(95, 30 + (index * 7));
            return 1;
        }

        function preRenderFlagTextures() {
            const size = 36; const radius = size / 2;
            flagSkins.forEach(flag => {
                const offCanvas = document.createElement('canvas'); offCanvas.width = size; offCanvas.height = size;
                const oCtx = offCanvas.getContext('2d');
                oCtx.beginPath(); oCtx.arc(radius, radius, radius, 0, Math.PI * 2); oCtx.clip();
                let fid = flag.id;
                if (fid === "USA") {
                    oCtx.fillStyle = "#ff4757"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffffff";
                    for(let j=0; j<size; j+=5) oCtx.fillRect(0, j, size, 2);
                    oCtx.fillStyle = "#2f3542"; oCtx.fillRect(0, 0, radius, radius);
                } else if (fid === "GB") {
                    oCtx.fillStyle = "#2f3542"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(radius - 5, 0, 10, size); oCtx.fillRect(0, radius - 5, size, 10);
                } else if (fid === "FR") {
                    oCtx.fillStyle = "#1e90ff"; oCtx.fillRect(0, 0, size * 0.34, size); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(size * 0.34, 0, size * 0.34, size); oCtx.fillStyle = "#ff4757"; oCtx.fillRect(size * 0.68, 0, size * 0.34, size);
                } else if (fid === "DE") {
                    oCtx.fillStyle = "#1e272e"; oCtx.fillRect(0, 0, size, size * 0.34); oCtx.fillStyle = "#ff4757";
                    oCtx.fillRect(0, size * 0.34, size, size * 0.34); oCtx.fillStyle = "#ffa502"; oCtx.fillRect(0, size * 0.68, size, size * 0.34);
                } else {
                    oCtx.fillStyle = `hsl(${Math.random() * 360}, 85%, 50%)`; oCtx.fillRect(0, 0, size, size);
                }
                cacheMap[fid] = offCanvas;
            });
        }

        class Snake {
            constructor(id, x, y, skinConfig, isNPC = false, explicitName = "") {
                this.id = id;
                this.skin = skinConfig;
                this.isNPC = isNPC;
                this.name = explicitName || (isNPC ? npcNames[Math.floor(Math.random() * npcNames.length)] : "Snake");
                this.angle = Math.random() * Math.PI * 2;
                this.targetLength = 20;
                this.parts = Array.from({ length: this.targetLength }, () => ({ x, y }));
                this.foodEatenCount = isNPC ? Math.floor(Math.random() * 80) : 0; 
                this.customLvl = isNPC ? Math.floor(Math.random() * 95) + 1 : profileState.level;
                
                // Added structural cooldown properties for NPCs
                this.npcBoostActiveUntil = 0;
                this.npcNextBoostAvailableAt = 0; 

                if(this.isNPC) {
                    const allNPCList = [...emojiCategories.emoji_smilies, ...emojiCategories.emoji_warriors, ...emojiCategories.emoji_animals, ...emojiCategories.emoji_legendary];
                    this.npcEmoji = allNPCList[Math.floor(Math.random() * allNPCList.length)];
                    
                    // Assign random initial skins to NPCs, including matching Legendary configurations
                    if (Math.random() < 0.25) {
                        let legends = clothingColors.filter(c => c.legendary);
                        this.skin = { type: 'color', val: legends[Math.floor(Math.random() * legends.length)].hex };
                    }
                }
            }

            get currentThickness() {
                return baseThickness;
            }

            update() {
                let head = this.parts[0];
                if (!head) return;

                let currentSpeed = baseSnakeSpeed;

                if (!this.isNPC) {
                    this.customLvl = profileState.level; 
                    if (inMenu) {
                        this.angle = Math.sin(pulseTime * 2) * 0.4 - Math.PI/2;
                        this.skin = selectedSkin; 
                        this.name = playerNameInput.value.trim() || "Player";
                        mouse.x = canvas.width / 2; mouse.y = canvas.height / 2 - 60;
                        currentSpeed = 1.5;
                    } else {
                        let worldMouseX = mouse.x + (head.x - canvas.width / 2);
                        let worldMouseY = mouse.y + (head.y - canvas.height / 2);
                        let dist = Math.hypot(worldMouseX - head.x, worldMouseY - head.y);
                        if (dist > 4) {
                            this.angle = Math.atan2(worldMouseY - head.y, worldMouseX - head.x);
                        }
                        if (Date.now() < boostActiveUntil) {
                            currentSpeed = baseSnakeSpeed * 1.85; 
                        }
                    }
                } else {
                    let now = Date.now();
                    let isNPCBoosting = now < this.npcBoostActiveUntil;

                    let danger = false;
                    let sx = head.x + Math.cos(this.angle) * dangerSensorRange;
                    let sy = head.y + Math.sin(this.angle) * dangerSensorRange;

                    if (gameStarted && !gameOver && player && player.parts[0]) {
                        player.parts.forEach((p, i) => {
                            if (i > 1 && Math.hypot(sx - p.x, sy - p.y) < this.currentThickness * 2.5) {
                                danger = true;
                                // NPCs obey a strict 60-second balance cooldown before firing boost again
                                if(now >= this.npcNextBoostAvailableAt && Math.random() < 0.4) { 
                                    this.npcBoostActiveUntil = now + 2500; 
                                    this.npcNextBoostAvailableAt = now + 60000; 
                                }
                            }
                        });
                    }

                    if (danger) {
                        this.angle += Math.PI / 2;
                    } else {
                        let food = findClosestFood(head);
                        if (food) {
                            this.angle += (Math.atan2(food.y - head.y, food.x - head.x) - this.angle) * 0.1;
                            if (Math.hypot(head.x - food.x, head.y - food.y) < 120 && now >= this.npcNextBoostAvailableAt && Math.random() < 0.05) {
                                this.npcBoostActiveUntil = now + 2000;
                                this.npcNextBoostAvailableAt = now + 60000;
                            }
                        }
                    }

                    if (isNPCBoosting) {
                        currentSpeed = baseSnakeSpeed * 1.75;
                    }
                }

                let newHead = { x: head.x + Math.cos(this.angle) * currentSpeed, y: head.y + Math.sin(this.angle) * currentSpeed };
                this.parts.unshift(newHead);
                
                while (this.parts.length > this.targetLength) this.parts.pop();

                if (head.x < -this.currentThickness) { head.x = arenaWidth + this.currentThickness; this.parts.forEach(p => p.x += arenaWidth); }
                else if (head.x > arenaWidth + this.currentThickness) { head.x = -this.currentThickness; this.parts.forEach(p => p.x -= arenaWidth); }
                if (head.y < -this.currentThickness) { head.y = arenaHeight + this.currentThickness; this.parts.forEach(p => p.y += arenaHeight); }
                else if (head.y > arenaHeight + this.currentThickness) { head.y = -this.currentThickness; this.parts.forEach(p => p.y -= arenaHeight); }
            }

            draw() {
                let head = this.parts[0];
                if (!head) return;

                const isColor = this.skin.type === 'color';
                const flagImg = !isColor ? cacheMap[this.skin.val] : null;
                const isPlayerActiveBoost = (!this.isNPC && Date.now() < boostActiveUntil);
                
                // Track if it's an explicit legendary skin
                let isLegendarySkin = (this.skin.type === 'color' && (this.skin.val === "#ff007f" || this.skin.val === "#7fff00" || this.skin.val === "#9400d3" || this.skin.val === "#ffd700"));
                let activeThick = this.currentThickness;

                for (let i = this.parts.length - 1; i >= 0; i--) {
                    let p = this.parts[i];
                    let r = activeThick * (1 - i / (this.parts.length * 2.5));
                    if (i === 0) r = activeThick + 2; 
                    let size = r * 2;

                    // Legendary skins now have specialized procedural patterns applied across segments
                    if (isLegendarySkin) {
                        ctx.shadowBlur = 22;
                        ctx.shadowColor = this.skin.val;
                        
                        // Modulate segment color on individual levels to create alternate matrix styles instead of simple flat textures
                        if (i % 2 === 0) {
                            ctx.fillStyle = "#ffffff"; 
                        } else {
                            ctx.fillStyle = this.skin.val;
                        }
                    } else {
                        if (isPlayerActiveBoost) {
                            ctx.shadowBlur = 10;
                            ctx.shadowColor = "#00f2fe";
                        }
                        ctx.fillStyle = this.skin.val;
                    }

                    if (isColor) {
                        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
                    } else if (flagImg) {
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(this.angle);
                        ctx.drawImage(flagImg, -r, -r, size, size); ctx.restore();
                    }
                    ctx.shadowBlur = 0; 
                }

                let currentFace = this.isNPC ? this.npcEmoji : selectedEmojiFace;
                
                ctx.save();
                ctx.translate(head.x, head.y);
                ctx.rotate(this.angle + Math.PI/2);
                ctx.font = `${activeThick * 2.1}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(currentFace, 0, 0);
                ctx.restore();

                ctx.save();
                ctx.textAlign = "center";
                ctx.font = "bold 13px 'Segoe UI', Arial, sans-serif";
                
                if (this.customLvl >= 100) {
                    let hue = (Date.now() / 15) % 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
                    ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                    ctx.shadowColor = "#000000"; 
                    ctx.shadowBlur = 4;
                }
                
                ctx.fillText(`[Lvl ${this.customLvl}] ${this.name}`, head.x, head.y - activeThick * 2.3);
                ctx.restore();
            }
        }

        function dropPointsOnDeath(parts, skinColor, computedThickness) {
            let verifiedColor = (skinColor && skinColor.startsWith("#")) ? skinColor : "#00ff88";
            parts.forEach((part, index) => {
                if (index % 2 === 0) { 
                    let scatterRadius = 70; 
                    foodArray.push({
                        x: part.x + (Math.random() * scatterRadius * 2 - scatterRadius),
                        y: part.y + (Math.random() * scatterRadius * 2 - scatterRadius),
                        color: verifiedColor,
                        isSuper: Math.random() < 0.25, 
                        baseRadius: 9
                    });
                }
            });
        }

        function tryActivateBoost() {
            if (inMenu || gameOver || !gameStarted) return;
            let now = Date.now();
            if (now - lastBoostTime >= boostCooldownMs) {
                lastBoostTime = now;
                boostActiveUntil = now + boostDurationMs;
            }
        }

        function handleSteerInput(clientX, clientY) {
            if (inMenu) return;
            gameStarted = true;
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('click', (e) => {
            if(e.target.closest('#start-screen') || e.target.closest('#game-over-screen') || e.target.closest('#level-stream-modal')) return;
            tryActivateBoost();
        });
        window.addEventListener('mousemove', (e) => { if(!isDrawingTouch) handleSteerInput(e.clientX, e.clientY); });
        
        window.addEventListener('touchstart', (e) => {
            if(e.target.closest('#start-screen') || e.target.closest('#game-over-screen') || e.target.closest('#level-stream-modal')) return;
            
            isDrawingTouch = true;
            const touch = e.touches[0];
            touchIndicator.style.display = "block";
            touchIndicator.style.left = `${touch.clientX}px`;
            touchIndicator.style.top = `${touch.clientY}px`;
            handleSteerInput(touch.clientX, touch.clientY);

            let now = Date.now();
            if (now - lastTapTime < 300) {
                e.preventDefault(); 
                tryActivateBoost();
            }
            lastTapTime = now;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if(e.target.closest('#start-screen') || e.target.closest('#game-over-screen') || e.target.closest('#level-stream-modal')) return;
            const touch = e.touches[0];
            touchIndicator.style.left = `${touch.clientX}px`;
            touchIndicator.style.top = `${touch.clientY}px`;
            handleSteerInput(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchend', () => { touchIndicator.style.display = "none"; isDrawingTouch = false; }, { passive: true });

        function findClosestFood(head) {
            let closest = null, minDist = Infinity;
            for (let i = 0; i < foodArray.length; i++) {
                let f = foodArray[i];
                let d = Math.hypot(head.x - f.x, head.y - f.y);
                if (d < minDist) { minDist = d; closest = f; }
            }
            return closest;
        }

        function spawnFood() {
            let isSuper = Math.random() < 0.12; 
            return {
                x: Math.random() * (arenaWidth - 60) + 30,
                y: Math.random() * (arenaHeight - 60) + 30,
                color: isSuper ? "#ffffff" : `hsl(${Math.random() * 360}, 100%, 60%)`,
                isSuper: isSuper,
                baseRadius: isSuper ? 12 : 7 
            };
        }

        function updateBoostHUD() {
            if (inMenu || gameOver) return;
            let now = Date.now();
            if (now < boostActiveUntil) {
                boostNotifier.innerText = "⚡ BOOST ACTIVE! ⚡";
                boostNotifier.className = "boost-active";
            } else {
                let timePassed = now - lastBoostTime;
                if (timePassed >= boostCooldownMs) {
                    boostNotifier.innerText = "BOOST READY (Double Tap / Click)";
                    boostNotifier.className = "boost-ready";
                } else {
                    let remaining = Math.ceil((boostCooldownMs - timePassed) / 1000);
                    boostNotifier.innerText = `Boost Charging... (${remaining}s)`;
                    boostNotifier.className = "boost-charging";
                }
            }
        }

        function renderLeaderboard() {
            if (inMenu || gameOver) return;
            
            let competitors = [];
            if (player) competitors.push({ name: player.name, food: player.foodEatenCount, isPlayer: true });
            npcs.forEach(n => competitors.push({ name: n.name, food: n.foodEatenCount, isPlayer: false }));
            
            competitors.sort((a,b) => b.food - a.food);
            
            let htmlStr = "";
            let maxLeaderboardRows = Math.min(5, competitors.length);
            for (let i=0; i < maxLeaderboardRows; i++) {
                let entry = competitors[i];
                let rowClass = entry.isPlayer ? "leaderboard-row player-row" : "leaderboard-row";
                htmlStr += `<div class="${rowClass}">
                    <span class="leaderboard-name">${i+1}. ${entry.name}</span>
                    <span>${entry.food}</span>
                </div>`;
            }
            leaderboardContent.innerHTML = htmlStr;
        }

        function setupArenaEnvironment() {
            score = 0; gameOver = false; gameStarted = false;
            lastBoostTime = 0; boostActiveUntil = 0; 
            if(scoreElement) scoreElement.innerText = score;
            forceResize();

            let startX = arenaWidth / 2;
            let startY = arenaHeight / 2;

            let pName = playerNameInput ? playerNameInput.value.trim() : "Player Snake";
            player = new Snake("player", startX, startY, selectedSkin, false, pName);
            
            foodArray = Array.from({ length: 300 }, spawnFood);
            
            const npcColors = ["#be2edd", "#f0932b", "#eb4d4b", "#70a1ff", "#eccc68", "#00f2fe", "#ff4757", "#ffd700"];
            npcs = [];
            for (let idx = 0; idx < 28; idx++) {
                let rx = Math.random() * arenaWidth;
                let ry = Math.random() * arenaHeight;
                let randomColor = npcColors[idx % npcColors.length];
                npcs.push(new Snake(`npc-${idx}`, rx, ry, { type: 'color', val: randomColor }, true));
            }
        }

        function startGame() {
            inMenu = false;
            matchStartTime = Date.now();
            if(startScreen) startScreen.style.display = "none";
            if(uiLayer) uiLayer.style.display = "block";
            if(leaderboardPanel) leaderboardPanel.style.display = "block";
            if(player) {
                player.name = playerNameInput.value.trim() || "Player";
                player.parts.forEach(p => { p.x = arenaWidth / 2; p.y = arenaHeight / 2; });
                player.foodEatenCount = 0;
                player.targetLength = 20;
            }
            lastBoostTime = Date.now() - 45000;
        }

        function tryAgain() {
            if(gameOverScreen) gameOverScreen.style.display = "none"; 
            if(uiLayer) uiLayer.style.display = "block";
            if(leaderboardPanel) leaderboardPanel.style.display = "block";
            inMenu = false; 
            matchStartTime = Date.now();
            setupArenaEnvironment();
            lastBoostTime = Date.now() - 45000;
        }

        function backToMenu() {
            inMenu = true; 
            if(gameOverScreen) gameOverScreen.style.display = "none"; 
            if(leaderboardPanel) leaderboardPanel.style.display = "none";
            if(startScreen) startScreen.style.display = "flex";
            setupArenaEnvironment(); 
            updateMenuProfileHUD();
            renderCustomizerItems();
        }

        function loop() {
            ctx.fillStyle = "#05040d"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            pulseTime += 0.07; 

            if(!player || !player.parts[0]) {
                requestAnimationFrame(loop);
                return;
            }

            updateBoostHUD();

            let cameraX = player.parts[0].x - canvas.width / 2;
            let cameraY = player.parts[0].y - canvas.height / 2;

            const padding = 100; 

            if (inMenu) {
                player.update();
            } else if (!gameOver) {
                player.update();
                npcs.forEach(npc => npc.update());

                if(gameStarted) {
                    addExperience(0.12);
                }

                if (foodArray.length < 320) {
                    foodArray.push(spawnFood());
                }

                if(Math.random() < 0.08) {
                    let randomNPC = npcs[Math.floor(Math.random() * npcs.length)];
                    if(randomNPC) {
                        randomNPC.foodEatenCount += Math.floor(Math.random() * 3) + 1;
                        randomNPC.targetLength += 1;
                    }
                }

                foodArray.forEach((food, index) => {
                    let hitRadius = player.currentThickness + food.baseRadius;
                    
                    if (gameStarted && !inMenu) {
                        if (Math.hypot(player.parts[0].x - food.x, player.parts[0].y - food.y) < hitRadius) {
                            let pts = food.isSuper ? 50 : 10;
                            score += pts; 
                            player.foodEatenCount += 1; 
                            
                            if (food.isSuper) addExperience(15);
                            else addExperience(3);

                            if(scoreElement) scoreElement.innerText = score;
                            player.targetLength += food.isSuper ? 4 : 1;
                            foodArray[index] = spawnFood();
                        }
                    }
                    
                    npcs.forEach(npc => {
                        let npchitRadius = npc.currentThickness + food.baseRadius;
                        if (npc.parts[0] && Math.hypot(npc.parts[0].x - food.x, npc.parts[0].y - food.y) < npchitRadius) {
                            npc.targetLength += food.isSuper ? 3 : 1;
                            npc.foodEatenCount += food.isSuper ? 3 : 1; 
                            foodArray[index] = spawnFood();
                        }
                    });
                });

                if (Math.floor(pulseTime * 10) % 5 === 0) {
                    renderLeaderboard();
                }

                if (gameStarted) {
                    let pHead = player.parts[0];
                    npcs.forEach(npc => {
                        for (let i = 3; i < npc.parts.length; i++) {
                            if (Math.hypot(pHead.x - npc.parts[i].x, pHead.y - npc.parts[i].y) < npc.currentThickness) {
                                gameOver = true; 
                                if(uiLayer) uiLayer.style.display = "none";
                                if(leaderboardPanel) leaderboardPanel.style.display = "none";
                                if(finalScoreElement) finalScoreElement.innerText = `Final Score: ${score}`;
                                if(gameOverScreen) gameOverScreen.style.display = "flex";
                                dropPointsOnDeath(player.parts, player.skin.val, player.currentThickness);
                            }
                        }
                        let nHead = npc.parts[0];
                        if(nHead) {
                            for (let i = 3; i < player.parts.length; i++) {
                                if (Math.hypot(nHead.x - player.parts[i].x, nHead.y - player.parts[i].y) < player.currentThickness) {
                                    dropPointsOnDeath(npc.parts, npc.skin.val, npc.currentThickness);
                                    npc.targetLength = 20; 
                                    npc.foodEatenCount = Math.floor(Math.random() * 20); 
                                    npc.parts = Array.from({ length: 20 }, () => ({ x: Math.random() * arenaWidth, y: Math.random() * arenaHeight }));
                                }
                            }
                        }
                    });
                }
            }

            ctx.save();
            
            let targetWidth = 1400; 
            let currentScale = 1.0; 
            if (canvas.width < targetWidth) {
                currentScale = canvas.width / targetWidth;
                if (currentScale < 0.55) currentScale = 0.55; 
            }
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(currentScale, currentScale);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            ctx.translate(-cameraX, -cameraY);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 2 / currentScale;
            const gridSpacer = 80;
            
            let adjustedLeft = cameraX - (padding / currentScale);
            let adjustedRight = cameraX + (canvas.width / currentScale) + padding;
            let adjustedTop = cameraY - (padding / currentScale);
            let adjustedBottom = cameraY + (canvas.height / currentScale) + padding;

            let startGridX = Math.max(0, Math.floor(adjustedLeft / gridSpacer) * gridSpacer);
            let endGridX = Math.min(arenaWidth, Math.ceil(adjustedRight / gridSpacer) * gridSpacer);
            for (let x = startGridX; x <= endGridX; x += gridSpacer) {
                ctx.beginPath(); ctx.moveTo(x, Math.max(0, adjustedTop)); ctx.lineTo(x, Math.min(arenaHeight, adjustedBottom)); ctx.stroke();
            }
            
            let startGridY = Math.max(0, Math.floor(adjustedTop / gridSpacer) * gridSpacer);
            let endGridY = Math.min(arenaHeight, Math.ceil(adjustedBottom / gridSpacer) * gridSpacer);
            for (let y = startGridY; y <= endGridY; y += gridSpacer) {
                ctx.beginPath(); ctx.moveTo(Math.max(0, adjustedLeft), y); ctx.lineTo(Math.min(arenaWidth, adjustedRight), y); ctx.stroke();
            }

            if (!inMenu) {
                foodArray.forEach(f => {
                    if (f.x >= adjustedLeft && f.x <= adjustedRight && f.y >= adjustedTop && f.y <= adjustedBottom) {
                        if (f.isSuper) {
                            let animatedRadius = f.baseRadius + Math.sin(pulseTime) * 1.5;
                            ctx.shadowBlur = 10; ctx.shadowColor = "#00f2fe";
                            ctx.fillStyle = "#ffffff";
                            ctx.beginPath(); ctx.arc(f.x, f.y, animatedRadius, 0, Math.PI * 2); ctx.fill();
                            ctx.shadowBlur = 0;  
                        } else {
                            ctx.fillStyle = f.color;
                            ctx.beginPath(); ctx.arc(f.x, f.y, f.baseRadius, 0, Math.PI * 2); ctx.fill();
                        }
                    }
                });

                npcs.forEach(npc => {
                    let h = npc.parts[0];
                    if (h && h.x >= adjustedLeft && h.x <= adjustedRight && h.y >= adjustedTop && h.y <= adjustedBottom) {
                        npc.draw();
                    }
                });
            }

            player.draw(); 
            ctx.restore();

            requestAnimationFrame(loop);
        }

        window.onload = function() {
            loadProfile();
            preRenderFlagTextures();
            renderCustomizerItems();
            setupArenaEnvironment();
            loop();
        };
    </script>
</body>
